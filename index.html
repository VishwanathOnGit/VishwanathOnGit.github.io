            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));

            margin-bottom: 30px;

            font-weight: 700;
            color: var(--text-primary);

        }

        }

            color: var(--text-secondary);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;

            padding: 20px;
            margin: 30px 0;

            padding: 30px;
            border: 1px solid var(--border-color);
            position: relative;
        }

            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;

            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .refresh-btn:hover {
            background: #3730a3;
            transform: translateY(-1px);
        }

            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;

        function updateAge() {
            const now = new Date();
            const diff = now - birthDate;

            // Calculate time units
            const years = Math.floor(diff / (365.25 * 24 * 60 * 60 * 1000));
            const remainingAfterYears = diff % (365.25 * 24 * 60 * 60 * 1000);
            
            const days = Math.floor(remainingAfterYears / (24 * 60 * 60 * 1000));
            const remainingAfterDays = remainingAfterYears % (24 * 60 * 60 * 1000);
            
            const hours = Math.floor(remainingAfterDays / (60 * 60 * 1000));
            const remainingAfterHours = remainingAfterDays % (60 * 60 * 1000);
            
            const minutes = Math.floor(remainingAfterHours / (60 * 1000));

            // Update display
            document.getElementById('years').textContent = years;
            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
        }

        function getRandomQuote() {
            if (quotesData.length === 0) return { text: "Loading quotes...", author: "", category: "Loading" };
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            return quotesData[randomIndex];
        }

        function displayQuote() {
            const quoteElement = document.getElementById('quoteText');
            const authorElement = document.getElementById('quoteAuthor');
            
            // Show loading briefly for smooth transition
            quoteElement.innerHTML = '<div class="loading"></div>';
            authorElement.textContent = '';

            // Simulate brief loading for better UX
            setTimeout(() => {
                const quote = getRandomQuote();
                quoteElement.textContent = `"${quote.text}"`;
                authorElement.textContent = `— ${quote.author}`;
            }, 300);
        }

        function fetchNewQuote() {
            displayQuote();
        }

        // Initialize everything
        function init() {
            updateAge();
            displayQuote();
            
            // Update age every second
            setInterval(updateAge, 1000);
        }

        // Start when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Life - Vishwanath</title>
    
    <!-- Favicons -->
    <link href="assets/img/favicon.png" rel="icon">
    <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --border-color: #e5e7eb;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container-main {
            background: var(--bg-primary);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            max-width: 720px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 16px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .greeting {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .greeting h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .greeting p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .age-counter {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 40px 30px;
            margin: 30px 0;
            border: 1px solid var(--border-color);
        }

        .age-display {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .age-numbers {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: nowrap;
            width: 100%;
        }

        .age-item {
            background: white;
            border-radius: 12px;
            padding: 18px 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-width: 110px;
            text-align: center;
        }

        .age-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
        }

        .age-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .health-status {
            background: linear-gradient(135deg, var(--secondary-color), #059669);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin: 30px 0;
            font-size: 1.3rem;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .health-status::before {
            content: '💚';
            font-size: 2rem;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .quote-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .quote-header {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .quote-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 15px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote-author {
            font-size: 0.95rem;
            color: var(--primary-color);
            font-weight: 500;
        }

        .refresh-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .refresh-btn:hover {
            background: #3730a3;
            transform: translateY(-1px);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container-main {
                padding: 30px 20px;
                margin: 10px;
                max-width: 95%;
            }

            .greeting h1 {
                font-size: 2rem;
            }

            .age-counter {
                padding: 25px 20px;
            }

            .age-numbers {
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .age-item {
                padding: 15px 10px;
                min-width: 100px;
                flex: 0 0 calc(50% - 5px);
                max-width: calc(50% - 5px);
            }

            .age-number {
                font-size: 1.5rem;
            }

            .back-btn {
                position: static;
                margin-bottom: 20px;
                align-self: flex-start;
            }
        }

        @media (max-width: 480px) {
            .greeting h1 {
                font-size: 1.8rem;
            }

            .container-main {
                padding: 25px 15px;
                margin: 5px;
            }

            .age-numbers {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .age-item {
                padding: 12px 8px;
                min-width: 80px;
                flex: 0 0 calc(50% - 4px);
                max-width: calc(50% - 4px);
            }

            .age-number {
                font-size: 1.3rem;
            }

            .age-label {
                font-size: 0.8rem;
            }

            .quote-text {
                font-size: 1rem;
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <a href="index.html" class="back-btn">
            <span>←</span> Back to Portfolio
        </a>

        <div class="greeting">
            <h1>Hi Vishwanath!</h1>
            <p>Welcome to your healthy life tracker</p>
        </div>

        <div class="age-counter">
            <div class="age-numbers">
                <div class="age-item">
                    <span class="age-number" id="years">0</span>
                    <div class="age-label">Years</div>
                </div>
                <div class="age-item">
                    <span class="age-number" id="days">0</span>
                    <div class="age-label">Days</div>
                </div>
                <div class="age-item">
                    <span class="age-number" id="hours">0</span>
                    <div class="age-label">Hours</div>
                </div>
                <div class="age-item">
                    <span class="age-number" id="minutes">0</span>
                    <div class="age-label">Minutes</div>
                </div>
            </div>
        </div>

        <div class="health-status">
            And You're Healthy! 🌟
        </div>

        <div class="quote-section">
            <div class="quote-header">
                <span>🌱</span>
                <span>Daily Health Wisdom</span>
            </div>
            <div class="quote-text" id="quoteText">
                <div class="loading"></div>
            </div>
            <div class="quote-author" id="quoteAuthor"></div>
            <button class="refresh-btn" onclick="fetchNewQuote()">New Quote</button>
        </div>
    </div>

    <script>
        // Set your birthdate here (YYYY-MM-DD)
        const birthDate = new Date('1996-05-18'); // Update this with your actual birthdate

        // Health quotes array as fallback
        const healthQuotes = [
            {
                text: "Take care of your body. It's the only place you have to live.",
                author: "Jim Rohn"
            },
            {
                text: "Health is a state of complete harmony of the body, mind and spirit.",
                author: "B.K.S. Iyengar"
            },
            {
                text: "The first wealth is health.",
                author: "Ralph Waldo Emerson"
            },
            {
                text: "A healthy outside starts from the inside.",
                author: "Robert Urich"
            },
            {
                text: "Your body can stand almost anything. It's your mind that you have to convince.",
                author: "Anonymous"
            },
            {
                text: "Health is not about the weight you lose, but about the life you gain.",
                author: "Anonymous"
            },
            {
                text: "Exercise is a celebration of what your body can do, not a punishment for what you ate.",
                author: "Anonymous"
            },
            {
                text: "The groundwork for all happiness is good health.",
                author: "Leigh Hunt"
            }
        ];

        function updateAge() {
            const now = new Date();
            const diff = now - birthDate;

            // Calculate time units
            const years = Math.floor(diff / (365.25 * 24 * 60 * 60 * 1000));
            const remainingAfterYears = diff % (365.25 * 24 * 60 * 60 * 1000);
            
            const days = Math.floor(remainingAfterYears / (24 * 60 * 60 * 1000));
            const remainingAfterDays = remainingAfterYears % (24 * 60 * 60 * 1000);
            
            const hours = Math.floor(remainingAfterDays / (60 * 60 * 1000));
            const remainingAfterHours = remainingAfterDays % (60 * 60 * 1000);
            
            const minutes = Math.floor(remainingAfterHours / (60 * 1000));

            // Update display
            document.getElementById('years').textContent = years;
            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
        }

        async function fetchHealthQuote() {
            try {
                // Try to fetch from a quotes API
                const response = await fetch('https://api.quotable.io/random?tags=motivational|wisdom|health');
                if (response.ok) {
                    const data = await response.json();
                    return {
                        text: data.content,
                        author: data.author
                    };
                } else {
                    throw new Error('API response not ok');
                }
            } catch (error) {
                // Use fallback quotes
                const randomIndex = Math.floor(Math.random() * healthQuotes.length);
                return healthQuotes[randomIndex];
            }
        }

        async function displayQuote() {
            const quoteElement = document.getElementById('quoteText');
            const authorElement = document.getElementById('quoteAuthor');
            
            // Show loading
            quoteElement.innerHTML = '<div class="loading"></div>';
            authorElement.textContent = '';

            try {
                const quote = await fetchHealthQuote();
                quoteElement.textContent = `"${quote.text}"`;
                authorElement.textContent = `— ${quote.author}`;
            } catch (error) {
                quoteElement.textContent = '"Take care of your body. It\'s the only place you have to live."';
                authorElement.textContent = '— Jim Rohn';
            }
        }

        function fetchNewQuote() {
            displayQuote();
        }

        // Initialize everything
        function init() {
            updateAge();
            displayQuote();
            
            // Update age every second
            setInterval(updateAge, 1000);
        }

        // Start when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
